syntax = "proto3";
option java_package = "org.epam.deltix.proto";

import "google/protobuf/struct.proto";

message Request {
    // correlation id, optional only for ping requests
    optional string id = 1;
    oneof request {
        DimensionalSchemaRequest dimensional_schema_request = 2;
        FunctionRequest function_request = 3;
        CalculateWorksheetsRequest calculate_worksheets_request = 4;
        CompileWorksheetsRequest compile_worksheets_request = 5;
        SimilaritySearchRequest similarity_search_request = 6;
        DownloadRequest download_request = 7;
        ExportRequest export_request = 8;
        CancelRequest cancel_request = 9;
        ProjectCalculateRequest project_calculate_request = 10;
        ProjectCancelRequest project_cancel_request = 11;
        ImportDefinitionList import_definition_list_request = 12;
        ImportDefinitionGet import_definition_get_request = 13;
        ImportSourceList import_source_list_request = 14;
        ImportSourceGet import_source_get_request = 15;
        ImportSourceCreate import_source_create_request = 16;
        ImportSourceUpdate import_source_update_request = 17;
        ImportSourceDelete import_source_delete_request = 18;
        ImportConnectionTest import_connection_test_request = 19;
        ImportCatalogList import_catalog_list_request = 20;
        ImportDatasetDiscover import_dataset_discover_request = 21;
        ImportSyncList import_sync_list_request = 22;
        ImportSyncGet import_sync_get_request = 23;
        ImportSyncStart import_sync_start_request = 24;
        ImportSyncCancel import_sync_cancel_request = 25;
        ImportRequest import_request = 26;
        ControlValuesRequest control_values_request = 27;
    }
}

message Viewport {
    oneof key {
        FieldKey fieldKey = 1;
        TotalKey totalKey = 2;
    }
    sint64 start_row = 3;
    sint64 end_row = 4;
    optional sint64 start_column = 5;
    optional sint64 end_column = 6;
    bool is_content = 7;
    optional bool is_raw = 8;
}

message DimensionalSchemaRequest {
    // Project name should only be specified for the WebSocket interface.
    optional string project_name = 1;
    // Table in the context of which to compile this formula.
    optional string table = 2;
    string formula = 3;
    // The sheets are supported by the HTTP endpoint only.
    map<string, string> worksheets = 4;
}

message FunctionRequest {
    // Project name should only be specified for the WebSocket interface.
    optional string project_name = 1;
    // The sheets are supported by the HTTP endpoint only.
    map<string, string> worksheets = 2;
}

message Response {
    // correlation id, if present - response message, otherwise - event
    optional string id = 1;
    // response status, if present - response message, otherwise - event
    optional Status status = 2;
    // optional error message for failed requests
    optional string error_message = 3;
    oneof response {
        ColumnData column_data = 4;
        DimensionalSchemaResponse dimensional_schema_response = 5;
        FunctionResponse function_response = 6;
        CompileResult compile_result = 7;
        SimilaritySearchResponse similarity_search_response = 8;
        Profile profile = 9;
        Index index = 10;
        ImportDefinitions import_definitions = 11;
        ImportDefinition import_definition = 12;
        ImportSources import_sources = 13;
        ImportSource import_source = 14;
        ImportConnection import_connection = 15;
        ImportCatalog import_catalog = 16;
        ImportDataset import_dataset = 17;
        ImportSyncs import_syncs = 18;
        ImportSync import_sync = 19;
        ImportResponse import_response = 20;
        ControlValuesResponse control_values_response = 21;
    }
}

enum Status {
    SUCCEED = 0;
    FAILED = 1;
    VERSION_CONFLICT = 2;
    NOT_FOUND = 3;
    INVALID_PROTOCOL = 4;
}


// For csv inputs:
// If the header (first line) is longer than any of the rows, the rows will be
// extended with empty values to match the header size.
// If the header is shorter than any of the rows, the header will be extended with
// autogenerated names ("Column<position>").
// If all values in an autogenerated column are empty or null, the column type will be set to `null`.
// Returns an error message in the following cases:
// * The document is empty
// * There are columns with identical names.
// * User does not have permissions to the file.
// * File read error.
// * Max number of columns (currently 512) is exceeded.
// * Max value length (currently 1,048,576) is exceeded.
// Note: The CSV document should not have mixed line endings; the line ending symbol is determined during header parsing.
message DimensionalSchemaResponse {
    optional string project_name = 1;
    string formula = 2;
    optional string error_message = 3;
    // list of fields for tables/inputs, or empty list for columns
    repeated string schema = 4;
    // list of key fields
    repeated string keys = 5;
    FieldInfo field_info = 6;
}

message FunctionResponse {
    repeated Function functions = 1;
}

message TableKey {
    string table = 1;
}

message FieldKey {
    string table = 1;
    string field = 2;
}

message ApplyKey {
    string table = 1;
    string function = 2; // sort/filter
}

message TotalKey {
    string table = 1;
    string field = 2;
    uint32 number = 3; // starts from 1
}

message OverrideKey {
    string table = 1;
    string field = 2;
    uint32 row = 3; // starts from 1
}

message Source {
    optional uint32 start_line = 1;   // starts from 1, deprecated
    optional uint32 start_column = 2; // starts from 1, deprecated
    optional string sheet = 3;
    optional uint32 start_index = 4;
    optional uint32 stop_index = 5;
}

message ParsingError {
    oneof key {
        TableKey tableKey = 1;
        FieldKey fieldKey = 2;
        ApplyKey applyKey = 3;
        TotalKey totalKey = 4;
        OverrideKey overrideKey = 5;
    }

    string message = 6;
    optional Source source = 7;
}

message CompilationError {
    oneof key {
        TableKey tableKey = 1;
        FieldKey fieldKey = 2;
        ApplyKey applyKey = 3;
        TotalKey totalKey = 4;
        OverrideKey overrideKey = 5;
    }

    string message = 6;
    optional Source source = 7;
}

message ColumnData {
    oneof key {
        FieldKey fieldKey = 1;
        TotalKey totalKey = 2;
    }
    optional string error_message = 3;
    repeated string data = 4;
    sint64 start_row = 5;
    sint64 end_row = 6;
    sint64 total_rows = 7;
    ColumnDataType type = 8;
    // true if cell represented as collection of data (N strings, N rows)
    bool isNested = 9;
    // name of the table in case ColumnDataType.TABLE
    optional string reference_table_name = 10;
    repeated PeriodSeries period_series = 11;
    optional ColumnFormat format = 12;
    optional bool is_raw = 13;
}

message Index {
    FieldKey key = 1;
    optional string error_message = 2;
}

message PeriodSeries {
   map<string, string> points = 1;
}

enum ColumnDataType {
    UNKNOWN = 0;
    STRING = 1;
    DOUBLE = 2;
    PERIOD_SERIES = 6;
    TABLE_REFERENCE = 7;
    TABLE_VALUE = 8;
}

enum FunctionType {
    // Functions that usually used to create new tables
    CREATE_TABLE_FUNCTIONS = 0;
    // Functions that aggregate array of values / row references into single value / row reference
    AGGREGATIONS_FUNCTIONS = 1;
    // Simple math and arithmetic: PI, Log, Sqrt etc
    MATH_FUNCTIONS = 2;
    // Logical operations, IF, IFNA etc.
    LOGICAL_FUNCTIONS = 3;
    // Miscellaneous functions that accept or create table (array of row reference)
    TABLE_FUNCTIONS = 4;
    // Miscellaneous functions that accept or create array
    ARRAY_FUNCTIONS = 5;
    // Functions that help look up value in array or table
    LOOKUP_FUNCTIONS = 6;
    // Functions that creates or operates with dates/timestamps
    DATE_FUNCTIONS = 7;
    // Functions that creates or operates with strings/texts
    TEXT_FUNCTIONS = 8;
    // Functions that creates or operates with period series
    PERIOD_SERIES_FUNCTIONS = 9;
    // Custom functions declared in python
    PYTHON_FUNCTIONS = 10;
    // Functions that useful for evaluation
    EVALUATION_FUNCTIONS = 11;
    // Functions used in controls
    CONTROL = 12;
}

message Function {
    string name = 1;
    string description = 2;
    repeated Argument arguments = 3;
    repeated FunctionType function_type = 4;
}

message Argument {
    string name = 1;
    string description = 2;
    bool repeatable = 3;
    bool optional = 4;
}

// A request to calculate the provided worksheets.
// If a project name is provided, the calculation may reuse the project cache, if available.
// An empty worksheets map will result in an empty calculation.
// The response to this request will be followed by column data messages for the requested viewports.
message CalculateWorksheetsRequest {
    optional string project_name = 1;
    map<string, string> worksheets = 2;
    repeated Viewport viewports = 3;
    optional bool includeCompilation = 4;
    optional bool includeProfile = 5;
    optional bool includeIndices = 6;
    optional bool shared = 7;
}

message ControlValuesRequest {
    string project = 1;
    map<string, string> sheets = 2;
    FieldKey key = 3;
    string query = 4;
    int64 start_row = 5;
    int64 end_row = 6;
}

message CompileWorksheetsRequest {
    string project = 1;
    map<string, string> worksheets = 2;
}

message Reference {
    oneof key {
        TableKey tableKey = 1;
        FieldKey fieldKey = 2;
        TotalKey totalKey = 3;
    }
}

message FieldInfo {
    oneof key {
        FieldKey fieldKey = 1;
        TotalKey totalKey = 2;
        OverrideKey overrideKey = 3;
    }
    ColumnDataType type = 4;
    // true if cell represented as collection of data (N strings, N rows)
    bool is_nested = 5;
    // true if the result can be assigned as is, false if you need to use multi field access
    bool is_assignable = 6;
    // name of the table in case ColumnDataType.TABLE
    optional string reference_table_name = 7;
    optional string hash = 8;
    optional ColumnFormat format = 9;
    repeated Reference references = 10;
}

message ParsedSheet {
    string name = 1;
    repeated ParsingError parsing_errors = 2;
}

message CompileResult {
    repeated ParsedSheet sheets = 1;
    repeated CompilationError compilation_errors = 2;
    repeated FieldInfo field_info = 3;
    repeated FieldKey indices = 4;
}

message DownloadRequest {
    string project = 1;
    map<string, string> sheets = 2;
    string table = 3;
    repeated string columns = 4;
}

message ExportRequest {
    string project = 1;
    map<string, string> sheets = 2;
    string table = 3;
    repeated string columns = 4;
    string path = 5;
}

message SimilaritySearchRequest {
    string project = 1;
    map<string, string> sheets = 2;
    repeated SimilaritySearchColumn columns = 3;
    string query = 4;
    sint32 n = 5;
    bool search_in_all = 6;
    bool use_evaluation = 7;
}

message SimilaritySearchResponse {
    repeated SimilaritySearchScore scores = 1;
}

message SimilaritySearchColumn {
    string table = 1;
    string column = 2;
    sint32 n = 3;
}

message SimilaritySearchScore {
    string table = 1;
    string column = 2;
    string value = 3;
    optional string description = 4;
    double score = 5;
}

message ControlValuesResponse {
    ColumnData data = 1;
    ColumnData available = 2;
}

enum FormatType {
    FORMAT_TYPE_GENERAL = 0;
    FORMAT_TYPE_BOOLEAN = 1;
    FORMAT_TYPE_CURRENCY = 2;
    FORMAT_TYPE_DATE = 3;
    FORMAT_TYPE_NUMBER = 4;
    FORMAT_TYPE_PERCENTAGE = 5;
    FORMAT_TYPE_SCIENTIFIC = 6;
}

message GeneralFormatArgs {
}

message BooleanFormatArgs {
}

message NumberFormatArgs {
    string format = 1;
    bool useThousandsSeparator = 2;
}

message ScientificFormatArgs {
    int32 format = 1;
}

message CurrencyFormatArgs {
    string format = 1;
    bool useThousandsSeparator = 2;
    string symbol = 3;
}

message DateFormatArgs {
    string pattern = 1;
}

message PercentageFormatArgs {
    string format = 1;
    bool useThousandsSeparator = 2;
}

message ColumnFormat {
    FormatType type = 1;
    oneof args {
        GeneralFormatArgs general_args = 2;
        BooleanFormatArgs boolean_args = 3;
        NumberFormatArgs number_args = 4;
        ScientificFormatArgs scientific_args = 5;
        CurrencyFormatArgs currency_args = 6;
        DateFormatArgs date_args = 7;
        PercentageFormatArgs percentage_args = 8;
    };
}

enum ExecutionStatus {
    RUNNING = 0;
    COMPLETED = 1;
}

enum ExecutionType {
    COMPUTE = 0;
    INDEX = 1;
}

message Profile {
    oneof key {
        TableKey tableKey = 1;
        FieldKey fieldKey = 2;
        TotalKey totalKey = 3;
        OverrideKey overrideKey = 4;
    }

    Source source = 5;
    ExecutionType type = 6;
    ExecutionStatus status = 7;
    optional int64 startedAt = 8;
    optional int64 stoppedAt = 9;
    optional int64 executionTime = 10;
}

message CancelRequest {
    string calculationId = 1;
    repeated CancelKey cancellationKeys = 2;
}

message CancelKey {
    oneof key {
        FieldKey fieldKey = 1;
        TotalKey totalKey = 2;
    }
}

message ProjectCalculateRequest {
    string project = 1;
}

message ProjectCancelRequest {
    string project = 1;
}


message ImportDefinitionList {
    string project = 1;
}

message ImportDefinitionGet {
    string project = 1;
    string definition = 2;
}

message ImportSourceList {
    string project = 1;
}

message ImportSourceGet {
    string project = 1;
    string source = 2;
}

message ImportSourceCreate {
    string project = 1;
    string definition = 2;
    string name = 3;
    google.protobuf.Struct configuration = 4;
}

message ImportSourceUpdate {
    string project = 1;
    string source = 2;
    string name = 3;
    google.protobuf.Struct configuration = 4;
}

message ImportSourceDelete {
    string project = 1;
    string source = 2;
}

message ImportConnectionTest {
    string project = 1;
    string definition = 2;
    google.protobuf.Struct configuration = 3;
}

message ImportCatalogList {
    string project = 1;
    string source = 2;
    optional string token = 3;
}

message ImportDatasetDiscover {
    string project = 1;
    string source = 2;
    string dataset = 3;
}

message ImportSyncList {
    string project = 1;
    optional string source = 2;
    optional string dataset = 3;
}

message ImportSyncGet {
    string project = 1;
    string sync = 2;
}

message ImportSyncStart {
    string project = 1;
    string source = 2;
    string dataset = 3;
    ImportSchema schema = 4;
}

message ImportSyncCancel {
    string project = 1;
    string source = 2;
    string sync = 3;
}

message ImportDefinitions {
    map<string, ImportDefinition> definitions = 1;
}

message ImportDefinition {
    string definition = 1;
    string name = 2;
    optional google.protobuf.Struct specification = 3;
}

message ImportSources {
    map<string, ImportSource> sources = 1;
}

message ImportSource {
    string definition = 1;
    string source = 2;
    string name = 3;
    optional google.protobuf.Struct configuration = 4;
}

message ImportConnection {
    string definition = 1;
    Result result = 2;
    optional string error = 3;

    enum Result {
        SUCCESS = 0;
        FAILURE = 1;
    }
}

message ImportCatalog {
    string definition = 1;
    string source = 2;
    map<string, ImportDataset> datasets = 3;
    optional string next = 4;
}

message ImportDataset {
    string definition = 1;
    string source = 2;
    string dataset = 3;
    optional ImportSchema schema = 4;
}

message ImportSyncs {
    map<string, ImportSync> syncs = 1;
}

message ImportSync {
    string definition = 1;
    string source = 2;
    string sync = 3;
    int64 version = 4;
    Status status = 5;
    int64 started_at = 6;
    int64 stopped_at = 7;
    ImportSchema schema = 8;

    enum Status {
        RUNNING = 0;
        SUCCEEDED = 1;
        FAILED = 2;
    }
}

message ImportSchema {
    map<string, ImportColumn> columns = 1;
}

message ImportColumn {
    string column = 1;
    string type = 2;
    ImportColumnType targetType = 3;
}

enum ImportColumnType {
    IMPORT_COLUMN_TYPE_STRING = 0;
    IMPORT_COLUMN_TYPE_DOUBLE = 1;
    IMPORT_COLUMN_TYPE_DATE = 2;
    IMPORT_COLUMN_TYPE_DATE_TIME = 3;
    IMPORT_COLUMN_TYPE_BOOLEAN = 4;
}

// internal
message ImportRequest {
    string definition = 1;
    string path = 2;
    string dataset = 3;
    ImportSchema schema = 4;
    google.protobuf.Struct configuration = 5;
}

// internal
message ImportResponse {
}
