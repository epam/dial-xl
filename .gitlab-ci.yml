      optional: true
    - job: publish_source_dial
      optional: true
    - job: publish_qgbot
      optional: true
  trigger:
    project: Clients/dial/test/dial-review/dial-xl
    branch: version-3  # TODO: DELETE THIS!!!
    strategy: depend
    inputs:
      gitlab_merge_request_iid: ${MERGE_REQUEST_IID}
      review_image_tag: ${REVIEW_IMAGE_TAG}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

