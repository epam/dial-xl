  stage: deploy
  variables:
    MERGE_REQUEST_IID: mr-${CI_MERGE_REQUEST_IID}
    REVIEW_IMAGE_TAG: $CI_COMMIT_REF_SLUG
  inherit:
    variables: false
  needs:
    - job: check_existing_branch_tag
    - job: publish_frontend
