.clean_nx_cache: &clean_nx_cache |
  NX_CACHE_DIR="frontend/.nx"
  NX_CACHE_LIMIT_MB=150
  if [ -d "$NX_CACHE_DIR" ]; then
    NX_CACHE_SIZE_KB=$(du -sk "$NX_CACHE_DIR" 2>/dev/null | cut -f1)
    NX_CACHE_SIZE_MB=$((NX_CACHE_SIZE_KB / 1024))
    echo "NX cache size: ${NX_CACHE_SIZE_MB}MB (limit: ${NX_CACHE_LIMIT_MB}MB)"
    if [ "$NX_CACHE_SIZE_MB" -gt "$NX_CACHE_LIMIT_MB" ]; then
      echo "NX cache exceeds ${NX_CACHE_LIMIT_MB}MB, cleaning..."
      rm -rf "$NX_CACHE_DIR"
      echo "NX cache cleaned"
    else
      echo "NX cache is within limit, keeping cache"
    fi
  else
    echo "NX cache directory does not exist, skipping cleanup"
  fi

### Frontend build jobs - split for parallel execution
.frontend_base:
  stage: build
  image: timbru31/java-node:11-jre-krypton
  variables:
    NODE_OPTIONS: "--require=$CI_PROJECT_DIR/frontend/max-listeners.js"
  tags:
    - Linux
    - DockerExecutor
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - frontend/**/*
          - backend/parser/src/main/antlr/com/epam/deltix/quantgrid/parser/**/*
          - infrastructure/**/*
    - if: $CI_COMMIT_TAG
      variables:
        NX_SKIP_NX_CACHE: "true"
    - if: $CI_COMMIT_BRANCH  == "main"
  interruptible: true

### Install frontend dependencies and generate grammar - runs first, other frontend jobs depend on this
install_frontend:
  extends: .frontend_base
  cache:
    - key:
        files:
          - frontend/yarn.lock
        prefix: "node-modules"
      paths:
        - frontend/node_modules/
      policy: pull-push
  script:
    - cd frontend
    - |
      if [ -d "node_modules" ] && [ -f "node_modules/.yarn-state.yml" ]; then
        echo "Cache restored, skipping yarn install..."
      else
        echo "No cache, running yarn install..."
        yarn install --immutable
      fi
    - |
      if [ -f "libs/parser/src/lib/grammar/SheetParser.ts" ]; then
        echo "Grammar cache restored, skipping generation..."
      else
        echo "No grammar cache, generating grammar..."
        yarn generateGrammar
      fi

### Format check - depends on install_frontend
format_frontend:
  extends: .frontend_base
  needs:
    - install_frontend
  cache:
    - key:
        files:
          - frontend/yarn.lock
        prefix: "node-modules"
      paths:
        - frontend/node_modules/
      policy: pull
  script:
    - cd frontend
    - yarn format

### Lint check - depends on install_frontend
lint_frontend:
  extends: .frontend_base
  needs:
    - install_frontend
  cache:
    - key:
        files:
          - frontend/yarn.lock
        prefix: "node-modules"
      paths:
        - frontend/node_modules/
      policy: pull
    - key: "cache-nx-lint-${CI_COMMIT_REF_SLUG}"
      paths:
        - frontend/.nx/
      policy: pull-push
  script:
    - cd frontend
    - yarn lint
  after_script:
    - *clean_nx_cache

### Run tests - depends on install_frontend
test_frontend:
  extends: .frontend_base
  needs:
    - install_frontend
  cache:
    - key:
        files:
          - frontend/yarn.lock
        prefix: "node-modules"
      paths:
        - frontend/node_modules/
      policy: pull
    - key: "cache-nx-test-${CI_COMMIT_REF_SLUG}"
      paths:
        - frontend/.nx/
      policy: pull-push
  script:
    - cd frontend
    - yarn test:ci
  after_script:
    - *clean_nx_cache
  artifacts:
    when: always
    paths:
      - frontend/apps/*/test-output/
      - frontend/libs/*/test-output/
    expire_in: 3 days
    reports:
      junit:
        - frontend/apps/*/test-output/junit-report.xml
        - frontend/libs/*/test-output/junit-report.xml

### Build frontend application - depends on install_frontend
build_frontend:
  extends: .frontend_base
  needs:
    - install_frontend
  cache:
    - key:
        files:
          - frontend/yarn.lock
        prefix: "node-modules"
      paths:
        - frontend/node_modules/
      policy: pull
    - key: "cache-nx-build-${CI_COMMIT_REF_SLUG}"
      paths:
        - frontend/.nx/
      policy: pull-push
  script:
    - cd frontend
    - yarn build:ci
  after_script:
    - *clean_nx_cache
  artifacts:
    when: on_success
    paths:
      - frontend/dist
    expire_in: 3 days
