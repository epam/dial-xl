include:
  - project: Gitlab/ci
    ref: 1.0.0
    file: jobs/cloud-auth/aws.gitlab-ci.yml

.template_test_qgbot:
  image: "python:3.12-slim"
  stage: e2e-test
  extends: .cloud-auth
  variables:
    GIT_DEPTH: 0
    AWS_DEFAULT_REGION: us-east-1
    AWS_ROLE_ARN: arn:aws:iam::619071342561:role/test-dialxl-test-results
    CORE_MODEL: anthropic.claude-sonnet-4-5-20250929-v1:0
    CLASSIFICATION_MODEL: anthropic.claude-sonnet-4-5-20250929-v1:0
    LLM_NAME: gemini-2.5-flash-lite
    LLM_HINT_SELECTION_NAME: gpt-4o-2024-08-06
  before_script:
    - pip install awscli
    - apt-get update && apt-get install -y git
    - apt-get update && apt-get install -y make && apt-get install -y protobuf-compiler && apt-get install -y wget && apt-get install -y curl && apt-get install -y jq
    - !reference [.cloud-auth, before_script]
  script:
    - echo "Bot version " $BOT_VERSION
    - echo "LLM name " $LLM_NAME
    - echo "Core model " $CORE_MODEL
    - echo "Classification model " $CLASSIFICATION_MODEL
    - echo "AI hint model " $AI_HINT_MODEL
    - echo "Max fix attempts " $MAX_FIX_ATTEMPTS

    - pip install poetry==1.8.3
    - cd ./python/
    - make build_client_package
    - cd ./assistant/
    - poetry install
    - poetry run python -m run_local &> qg.log &
    - |
      if poetry run python -m scripts.healthcheck --addr http://localhost:5000; then
        poetry run nox -s ${PYTEST_TEST_TYPE}_tests
      else
        echo "QG server failed to start"
        exit 1
      fi
  interruptible: true
  tags:
    - kubernetes
    - staging
  artifacts:
    paths:
      - python/assistant/report.xlsx
      - python/assistant/report.json
      - python/assistant/qg.log
    expire_in: 3 month
    when: always
