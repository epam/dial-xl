include:
  - project: Gitlab/ci
    ref: 1.0.0
    file: jobs/cloud-auth/aws.gitlab-ci.yml

.template_test_qgbot:
  image: "python:3.12-slim"
  stage: e2e-test
  extends: .cloud-auth
  variables:
    GIT_DEPTH: 0
    AWS_DEFAULT_REGION: us-east-1
    AWS_ROLE_ARN: arn:aws:iam::619071342561:role/test-dialxl-test-results

    OVERRIDE_ASSISTANT__LANGGRAPH__CHECKPOINT-ENCRYPTION: "False"

    ENV_TYPE: "test"

    LOG_LEVEL: "DEBUG"
    PYDANTIC_V2: "True"
    DIAL_SDK_LOG: "INFO"
    
    WEB_CONCURRENCY: 8
    UVICORN_LIMIT_CONCURRENCY: "512"
    UVICORN_TIMEOUT_KEEP_ALIVE: "600"

  before_script:
    - pip install awscli
    - apt-get update && apt-get install -y git
    - apt-get update && apt-get install -y make && apt-get install -y protobuf-compiler && apt-get install -y wget && apt-get install -y curl && apt-get install -y jq
    - !reference [ .cloud-auth, before_script ]
  script:
    - pip install poetry>=2.0
    - cd ./python/
    - make build_client_package
    - cd ./assistant/
    - poetry install
    - poetry run python -m run &> qg.log &
    - |
      if poetry run python -m scripts.healthcheck --addr http://localhost:5000; then
        make run-e2e-${PYTEST_TEST_TYPE}
      else
        echo "DIAL XL Assistant server failed to start."
        exit 1
      fi
  interruptible: true
  tags:
    - kubernetes
    - staging
  artifacts:
    paths:
      - python/assistant/report.xlsx
      - python/assistant/report.json
      - python/assistant/qg.log
    expire_in: 3 month
    when: always
