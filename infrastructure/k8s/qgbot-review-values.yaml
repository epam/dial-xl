image:
  pullPolicy: Always
  registry: registry-test.deltixhub.com
  repository: deltix.docker/quantgrid/qgbot
  # tag: development # should be specified in .gitlab-ci.yml as --set variable
  pullSecrets:
    - epm-rtc-registry-test

podAnnotations:
  autorestart: '{{ dateInZone "2006-01-02 15:04:05Z" (now) "UTC" }}'

containerSecurityContext:
  runAsUser: 1001

podSecurityContext:
  fsGroup: 1001

serviceAccount:
  create: false

env:
  LOG_LEVEL: "DEBUG"

  ENV_TYPE: "default"
  OVERRIDE_ASSISTANT__URL__DIAL: "http://dial-{{ .Values.global.mergeid }}-core"
  OVERRIDE_ASSISTANT__URL__XL: "https://{{ .Values.global.url }}"

  PYDANTIC_V2: "True"
  DIAL_SDK_LOG: "INFO"

  WEB_CONCURRENCY: "1"
  UVICORN_LIMIT_CONCURRENCY: "512"
  UVICORN_TIMEOUT_KEEP_ALIVE: "600"