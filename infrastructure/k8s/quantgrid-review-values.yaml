global:
  imagePullSecrets:
    - epm-rtc-registry-test

backendControl:
  enabled: true
  image:
    registry: registry-test.deltixhub.com
    pullPolicy: Always
  args:
    - server

  podAnnotations:
    autorestart: '{{ dateInZone "2023-01-02 15:04:05Z" (now) "UTC" }}'

  env:
    WEB_REDIS_ADDRESS: "[redis://redis-cluster.quantgrid-review.svc.cluster.local.:6379]"
    WEB_NODE_TYPE: "CONTROL"
    WEB_SERVER_PORT: "8080"
    SECURITY_ENABLED: "true"
    JWKS_URI: "https://chatbot-ui-staging.eu.auth0.com/.well-known/jwks.json"
    WEB_STORAGE_DIAL_ENABLED: "true"
    WEB_STORAGE_DIAL_BASE_URL: "http://dial-{{ .Values.global.mergeid }}-core.quantgrid-review.svc.cluster.local"
    SYNC_DESTINATION_IMAGE: "registry-test.deltixhub.com/deltix.docker/quantgrid/destination-dial:{{ .Values.global.mergeid }}"
    SYNC_DESTINATION_SECRET: "epm-rtc-registry-test"
    SYNC_DIAL_SOURCE_IMAGE: "registry-test.deltixhub.com/deltix.docker/quantgrid/source-dial:{{ .Values.global.mergeid }}"
    SYNC_DIAL_SOURCE_SECRET: "epm-rtc-registry-test"
    SYNC_DIAL_SOURCE_ENABLED: "true"
    SYNC_K8S_NAMESPACE: quantgrid-review

  secret:
    SOME_SECRET_ENV: secret_env

  resources:
    requests:
      cpu: 0.25
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 1

  persistence:
    enabled: false

  rbac:
    create: true

backendCompute:
  enabled: true
  image:
    registry: registry-test.deltixhub.com
    pullPolicy: Always
  args:
    - server

  podAnnotations:
    autorestart: '{{ dateInZone "2023-01-02 15:04:05Z" (now) "UTC" }}'

  env:
    WEB_REDIS_ADDRESS: "[redis://redis-cluster.quantgrid-review.svc.cluster.local.:6379]"
    WEB_NODE_TYPE: "COMPUTE"
    WEB_SERVER_PORT: "10001"
    SECURITY_ENABLED: "true"
    JWKS_URI: "https://chatbot-ui-staging.eu.auth0.com/.well-known/jwks.json"
    WEB_STORAGE_DIAL_ENABLED: "true"
    WEB_STORAGE_DIAL_BASE_URL: "http://dial-{{ .Values.global.mergeid }}-core.quantgrid-review.svc.cluster.local"
    JAVA_OPTS: |
      -server
      -Djava.awt.headless=true
      -Xms2g
      -Xmx2g
      -XX:+AlwaysActAsServerClassMachine
      -XX:+AlwaysPreTouch
      -XX:+PerfDisableSharedMem
      -XX:MaxTenuringThreshold=1
      -Dnetworkaddress.cache.ttl=60s

  secret:
    SOME_SECRET_ENV: secret_env

  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 2
      memory: 4Gi

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 1

  persistence:
    enabled: false

frontend:
  enabled: true
  image:
    registry: registry-test.deltixhub.com
    pullPolicy: Always

  podAnnotations:
    autorestart: '{{ dateInZone "2023-01-02 15:04:05Z" (now) "UTC" }}'

  updateStrategy:
    type: Recreate

  env:
    CORE_HOST: "dial-{{ .Values.global.mergeid }}-core.quantgrid-review.svc.cluster.local"

  config: |
    const dialOverlayUrl = 'https://chat-{{ .Values.global.url }}';
    const authAuthority = 'https://chatbot-ui-staging.eu.auth0.com';
    const authClientId = 'CWg7UOOe8VuN5yTX23GiUs3fxW5BVqU8';
    const authProvider = 'auth0';
    const authScope = 'openid profile email';
    const dialBaseUrl = "https://{{ .Values.global.url }}/core";
    const defaultLogoUrl = '';
    const qgBotDeploymentName = 'qg';
    const adminRoles = ['admin'];
    const featureFlags = ['askAI', 'copilotAutocomplete'];
    const defaultPanelsSettings = {
      chat: {
        isActive: true,
        position: 'left',
      },
      project: {
        isActive: false,
        position: 'right',
      },
      error: {
        isActive: false,
        position: 'right',
      },
      editor: {
        isActive: false,
        position: 'right',
      },
      undoRedo: {
        isActive: false,
        position: 'left',
      },
      details: {
        isActive: false,
        position: 'right',
      },
    };

    const defaultLeftPanelSize = 550;
    const defaultRightPanelSize = 550;

ingress:
  enabled: true
  pathType: "Prefix"
  path: "/"
  ingressClassName: allow-all
  annotations:
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400"
    alb.ingress.kubernetes.io/listen-ports: '[{ "HTTP" : 80, "HTTPS" : 443 }]'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-north-1:725751206603:certificate/373e8fd1-088e-4022-adf1-5f3e7820fb4a"
    alb.ingress.kubernetes.io/ssl-redirect: "443"

redis:
  enabled: false
